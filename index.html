<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Riya 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ff4d88; /* full pink */
  color: white;

  /* PERFECT CENTERING */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

.container {
  padding: 20px;
}

/* Emojis */
.subtitle {
  font-size: 1.6em;
}

/* Cake */
.cake {
  font-size: 90px;
  margin: 10px 0;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-12px);}
}

/* Title */
.title {
  font-family: 'Pacifico', cursive;
  font-size: 3em;
  margin: 10px 0;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d88;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ffe0ea;
}

/* Floating emojis */
.emoji {
  position: absolute;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(100vh); opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}

/* Confetti */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  animation: fall 4s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(100vh);}
}

/* Mobile */
@media(max-width: 600px) {
  .title { font-size: 2.2em; }
  .cake { font-size: 70px; }
}
</style>
</head>

<body>

<div class="container">

  <!-- Emojis -->
  <div class="subtitle">🎉✨🎂🥳✨🎉</div>

  <!-- Cake (NOW ALWAYS VISIBLE) -->
  <div class="cake">🎂</div>

  <!-- Title -->
  <div class="title">Happy Birthday Riya</div>

  <!-- Button -->
  <button onclick="celebrate()">🎉 Celebrate 🎉</button>

</div>

<script>
// Floating emojis
const emojis = ["✨","🎉","🎂","🌸","💫","🥳"];

function createEmoji() {
  const el = document.createElement("div");
  el.classList.add("emoji");
  el.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (18 + Math.random()*25) + "px";
  document.body.appendChild(el);

  setTimeout(() => el.remove(), 5000);
}

// Confetti
function createConfetti() {
  const confetti = document.createElement("div");
  confetti.classList.add("confetti");
  confetti.style.left = Math.random() * 100 + "vw";
  confetti.style.background = `hsl(${Math.random()*360},100%,60%)`;
  document.body.appendChild(confetti);

  setTimeout(() => confetti.remove(), 4000);
}

setInterval(createEmoji, 600);
setInterval(createConfetti, 250);

// Celebrate burst
function celebrate() {
  for(let i=0;i<70;i++){
    setTimeout(createEmoji, i*50);
  }
}
</script>

</body>
</html>
